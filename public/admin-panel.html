<!DOCTYPE html>
<html>
<head>
    <title>Admin Upload Panel</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
            background:#f5f5f5;
        }

        h1{
            background:#ff4081;
            color:white;
            padding:20px;
        }

        .box{
            background:white;
            width:400px;
            margin:50px auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        select,input,button{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            background:#ff4081;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h1>Admin Upload Panel</h1>

<div class="box">

    <select id="category">
        <option value="blouse">Blouse Back Design</option>
        <option value="front">Blouse Front Design</option>
        <option value="sleeves">Blouse Sleeves Design</option>
        <option value="tassels">Saree Tassels Design</option>
    </select>

    <input type="file" id="image">

    <button onclick="uploadImage()">Upload Image</button>

</div>

<script>

async function uploadImage(){

    const file = document.getElementById("image").files[0];
    const category = document.getElementById("category").value;

    if(!file){
        alert("Select an image first");
        return;
    }

    const formData = new FormData();
    formData.append("image", file);
    formData.append("category", category);

    const res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if(data.success){
        alert("Image uploaded successfully!");
    }else{
        alert("Upload failed");
    }
}

</script>

</body>
</html>

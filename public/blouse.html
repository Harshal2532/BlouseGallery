<!DOCTYPE html>
<html>
<head>
    <title>Blouse Back Design</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f5f5f5;
            text-align:center;
        }

        h1{
            margin:0;
            padding:20px;
            background:#ff4081;
            color:white;
        }

        .gallery{
            display:grid;
            grid-template-columns:repeat(5,1fr);
            gap:15px;
            padding:20px;
        }

        .item{
            background:white;
            padding:10px;
            border-radius:10px;
            box-shadow:0 0 8px rgba(0,0,0,0.2);
        }

        .item img{
            width:100%;
            height:220px;
            object-fit:cover;
            cursor:pointer;
            border-radius:5px;
        }

        .item img:hover{
            transform:scale(1.03);
            transition:0.3s;
        }

        .item p{
            margin:8px 0 0;
            font-weight:bold;
            font-size:18px;
        }

        .popup{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.9);
            justify-content:center;
            align-items:center;
            z-index:1000;
        }

        .popup img{
            max-width:90%;
            max-height:90%;
            border:5px solid white;
            border-radius:10px;
        }

        .back-btn{
            display:inline-block;
            margin:20px;
            padding:12px 25px;
            background:#ff4081;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .back-btn:hover{
            background:#e91e63;
        }
    </style>
</head>
<body>

<h1>Blouse Back Design</h1>

<div class="gallery" id="gallery"></div>

<a href="index.html" class="back-btn">Back To Home</a>

<div id="popup" class="popup" onclick="closeImage()">
    <img id="popupImg">
</div>

<script>
async function loadImages() {
    const res = await fetch("/images/blouse");
    const files = await res.json();

    const gallery = document.getElementById("gallery");

    gallery.innerHTML = "";

    files.forEach((file, index) => {
        gallery.innerHTML += `
            <div class="item">
                <img src="/uploads-blouse/${file}"
                     onclick="openImage('/uploads-blouse/${file}')">
                <p>${index + 1}</p>
            </div>
        `;
    });
}

loadImages();

function openImage(src){
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popupImg").src = src;
}

function closeImage(){
    document.getElementById("popup").style.display = "none";
}
</script>
</body>
</html>
